<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick a Shift — Work when you want to</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const {useState}=React;

const STUDENT_STEPS=[
  {n:1,icon:'user',t:'Create your profile',d:'Add your availability, skills and a photo. Takes 2 minutes — no CV needed.'},
  {n:2,icon:'search',t:'Browse shifts near you',d:'Filter by district, pay and time. See only shifts that fit between your classes.'},
  {n:3,icon:'euro',t:'Work it & get paid',d:'Show up, clock in, get paid within 24h straight to your account.'},
];
const BIZ_STEPS=[
  {n:1,icon:'plus',t:'Post a shift',d:'Title, time, pay and location. Live in under 60 seconds.'},
  {n:2,icon:'users',t:'Pick your workers',d:'Review ranked applicants by reliability score and accept with one tap.'},
  {n:3,icon:'check',t:'Done',d:'Your worker shows up. We handle payments, contracts and invoicing.'},
];
const STATS=[
  {num:'12,400',u:'+',lbl:'Active student workers'},
  {num:'860',u:'+',lbl:'Madrid businesses'},
  {num:'98',u:'%',lbl:'On-time arrival rate'},
  {num:'€12.40',u:'',lbl:'Average hourly pay'},
];

function Hero(){
  return (
    <section className="hero">
      <div className="wrap">
        <div className="hero-grid">
          <div>
            <div className="eyebrow"><span className="pip">NEW</span> Now live across all 21 Madrid districts</div>
            <h1 className="hero-h">Work when you <em>want to.</em></h1>
            <p className="hero-sub">Find 1–4 hour paid shifts that fit perfectly between your classes. Pick one. Work it. Get paid.</p>
            <div className="hero-ctas">
              <a className="btn btn-primary btn-lg" href="Pick a Shift - Student Dashboard.html"><Icon name="search" size={18}/> Browse Shifts Near Me</a>
              <a className="btn btn-outline btn-lg" href="Pick a Shift - Business Dashboard.html"><Icon name="plus" size={18}/> Post a Shift</a>
            </div>
          </div>
          <div className="hero-visual">
            <ShiftCard s={SHIFTS[0]} applied={false} onApply={()=>{}}/>
            <div className="float-card" style={{top:-26,right:-10}}>
              <span className="avatar sm" style={{background:'#2B7A55'}}>SG</span>
              <div style={{fontSize:13.5,fontWeight:700,lineHeight:1.3}}>Sofía got paid<br/><span style={{color:'var(--green)',fontWeight:800}}>€48.00 ✓</span></div>
            </div>
            <div className="float-card" style={{bottom:-40,left:-16}}>
              <span className="ds-ico" style={{width:34,height:34,borderRadius:9,background:'var(--primary-tint)',color:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="bolt" size={17} fill/></span>
              <div style={{fontSize:13.5,fontWeight:700}}>Avg. fill time<br/><span style={{color:'var(--muted)',fontWeight:600}}>under 9 min</span></div>
            </div>
          </div>
        </div>
        <div className="stats-row">
          {STATS.map(s=>(
            <div className="stat" key={s.lbl}>
              <div className="num">{s.num}<span className="u">{s.u}</span></div>
              <div className="lbl">{s.lbl}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function StepCol({tag,title,steps,alt,cta}){
  return (
    <div className={'howit-col'+(alt?' alt':'')}>
      <div className="col-head">
        <span className="ds-ico" style={alt?{background:'var(--primary)',color:'#fff'}:{}}><Icon name={alt?'briefcase':'user'} size={20}/></span>
        <div><div className="col-tag">{tag}</div><h3>{title}</h3></div>
      </div>
      <div className="steps">
        {steps.map((s,i)=>(
          <React.Fragment key={s.n}>
            <div className="step">
              <div className="step-num">{s.n}</div>
              <div><h4>{s.t}</h4><p>{s.d}</p></div>
            </div>
            {i<steps.length-1 && <div className="step-conn"><Icon name="arrowdown" size={16}/></div>}
          </React.Fragment>
        ))}
      </div>
      <a className={'btn '+(alt?'btn-primary':'btn-outline')+' btn-block'} style={{marginTop:22}}
         href={alt?'Pick a Shift - Business Dashboard.html':'Pick a Shift - Student Dashboard.html'}>{cta}</a>
    </div>
  );
}

function HowItWorks(){
  return (
    <section className="block" id="how">
      <div className="wrap">
        <div className="section-head">
          <div className="kicker">How it works</div>
          <h2 className="section-title">Two sides. One simple flow.</h2>
          <p className="section-sub">Whether you're picking up shifts or filling them, it takes three steps.</p>
        </div>
        <div className="howit">
          <StepCol tag="For Students" title="Earn between classes" steps={STUDENT_STEPS} cta="Start earning"/>
          <StepCol tag="For Business" title="Staff up in minutes" steps={BIZ_STEPS} alt cta="Post your first shift"/>
        </div>
      </div>
    </section>
  );
}

function ShiftsPreview(){
  const [applied,setApplied]=useState({});
  const [toast,showToast]=useToast();
  const onApply=(s)=>{setApplied(p=>({...p,[s.id]:true}));showToast('Applied to '+s.biz+' — good luck!');};
  return (
    <section className="block" style={{paddingTop:0}}>
      <div className="wrap">
        <div className="section-head">
          <div className="kicker">Open right now</div>
          <h2 className="section-title">Shifts near you, today.</h2>
          <p className="section-sub">Real openings across Madrid. New ones drop every few minutes.</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}} className="preview-grid">
          {[SHIFTS[0],SHIFTS[2],SHIFTS[1]].map(s=>(
            <ShiftCard key={s.id} s={s} applied={!!applied[s.id]} onApply={onApply}/>
          ))}
        </div>
        <div style={{textAlign:'center',marginTop:34}}>
          <a className="btn btn-primary btn-lg" href="Pick a Shift - Student Dashboard.html">See all open shifts <Icon name="chevright" size={17}/></a>
        </div>
      </div>
      {toast}
      <style>{`@media(max-width:880px){.preview-grid{grid-template-columns:1fr !important;}}`}</style>
    </section>
  );
}

function App(){
  return (<>
    <SiteHeader active="How it Works"/>
    <Hero/>
    <HowItWorks/>
    <ShiftsPreview/>
    <SiteFooter/>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
